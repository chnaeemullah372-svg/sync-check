kind = "web"
previewPath = "/"
title = "Sync Check"
version = "1.0.0"
id = "artifacts/sync-check"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21974

[services.development]
run = "pnpm --filter @workspace/sync-check run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/sync-check", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "artifacts/sync-check/.output/server/index.mjs"]

[services.production.run.env]
NODE_ENV = "production"

[services.production.health.startup]
path = "/healthz"

[services.env]
PORT = "21974"
BASE_PATH = "/"
